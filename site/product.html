<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TrustTheHood / Товар</title>
    <link rel="stylesheet" href="style.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,400;14..32,500;14..32,600;14..32,700&display=swap" rel="stylesheet">
    <style>
        /* Дополнительные стили для страницы товара */
        .size-selector {
            display: flex;
            gap: 10px;
            margin: 20px 0;
            flex-wrap: wrap;
        }
        
        .size-option {
            width: 50px;
            height: 50px;
            border: 1px solid var(--border);
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            font-weight: 500;
            transition: all 0.2s;
        }
        
        .size-option:hover {
            border-color: var(--text);
        }
        
        .size-option.selected {
            background: var(--text);
            color: var(--bg);
            border-color: var(--text);
        }
        
        .size-option.disabled {
            opacity: 0.3;
            cursor: not-allowed;
            text-decoration: line-through;
        }
        
        .quantity-selector {
            display: flex;
            align-items: center;
            border: 1px solid var(--border);
            width: fit-content;
            margin: 20px 0;
        }
        
        .quantity-btn {
            width: 45px;
            height: 45px;
            background: none;
            border: none;
            font-size: 20px;
            cursor: pointer;
            font-family: var(--font-main);
        }
        
        .quantity-btn:hover {
            background: var(--border);
        }
        
        .quantity-input {
            width: 60px;
            height: 45px;
            text-align: center;
            border: none;
            border-left: 1px solid var(--border);
            border-right: 1px solid var(--border);
            font-family: var(--font-main);
            font-size: 16px;
        }
        
        .product-meta {
            margin-top: 40px;
            padding-top: 30px;
            border-top: 1px solid var(--border);
            font-size: 14px;
            color: var(--text-light);
        }
        
        .product-meta p {
            margin-bottom: 10px;
        }
        
        .share-buttons {
            display: flex;
            gap: 15px;
            margin-top: 20px;
        }
        
        .share-btn {
            text-transform: uppercase;
            font-size: 12px;
            font-weight: 600;
            cursor: pointer;
            text-decoration: underline;
            text-underline-offset: 3px;
        }
        
        .share-btn:hover {
            color: var(--text-light);
        }
        
        .related-products {
            margin-top: 80px;
        }
        
        .related-title {
            font-size: 18px;
            font-weight: 500;
            margin-bottom: 30px;
            text-transform: uppercase;
        }
    </style>
</head>
<body>
    <div class="top-banner">Бесплатная доставка от 7000₽</div>

    <header class="site-header">
        <div class="header-container">
            <div class="logo">
                <a href="index.html">TrustTheHood</a>
            </div>
            <nav class="main-nav">
                <ul>
                    <li><a href="index.html">Магазин</a></li>
                    <li><a href="profile.html">Профиль</a></li>
                    <li><a href="orders.html">Заказы</a></li>
                    <li><a href="cart.html">Корзина(<span id="cart-count">0</span>)</a></li>
                </ul>
            </nav>
        </div>
    </header>

    <main class="main-content">
        <div class="container">
            <div class="product-detail" id="product-detail">
                <!-- Динамически загружается через JS -->
            </div>
            
            <!-- Похожие товары -->
            <div class="related-products">
                <h3 class="related-title">You might also like</h3>
                <div class="products-grid" id="related-grid">
                    <!-- Похожие товары будут загружены через JS -->
                </div>
            </div>
            
            <a href="index.html" class="back-link">← Вернуться в магазин</a>
        </div>
    </main>

    <footer class="site-footer">
        <div class="container">
            <p>© 2026 TTH STORE</p>
        </div>
    </footer>

    <script src="script.js"></script>
    <script>
        document.addEventListener('DOMContentLoaded', function() {
            loadProductPage();
            loadRelatedProducts();
            
            // Обработчики для выбора размера (добавляются после загрузки товара)
            setTimeout(setupProductInteractions, 100);
        });
        
        function loadProductPage() {
            const urlParams = new URLSearchParams(window.location.search);
            const productId = parseInt(urlParams.get('id'));
            const product = products.find(p => p.id === productId);
            
            const container = document.getElementById('product-detail');
            if (!container) return;
            
            if (!product) {
                container.innerHTML = '<p style="text-align:center; padding:60px;">Product not found.</p>';
                return;
            }
            
            // Определяем доступные размеры (для демо)
            const availableSizes = ['XS', 'S', 'M', 'L', 'XL'];
            const outOfStockSizes = ['XS', 'XL']; // Для демонстрации недоступных размеров
            
            container.innerHTML = `
                <div class="product-image-large">
                    <img src="https://via.placeholder.com/600x800/f6f6f6/000000?text=${product.name.replace(/ /g, '+')}" alt="${product.name}" style="width:100%; height:100%; object-fit:cover;">
                </div>
                <div class="product-info-detail">
                    <h1 class="product-title-large">${product.name}</h1>
                    <p class="product-price-large">₽${product.price.toFixed(2)}</p>
                    
                    <div class="size-selector" id="size-selector">
                        ${availableSizes.map(size => `
                            <div class="size-option ${outOfStockSizes.includes(size) ? 'disabled' : ''}" data-size="${size}">${size}</div>
                        `).join('')}
                    </div>
                    
                    <div class="quantity-selector">
                        <button class="quantity-btn minus">−</button>
                        <input type="text" class="quantity-input" value="1" readonly>
                        <button class="quantity-btn plus">+</button>
                    </div>
                    
                    ${product.inStock ? 
                        `<button class="btn add-to-cart-detail" data-id="${product.id}">Добавить в корзину</button>` : 
                        '<p style="color:#999; font-weight:600;">ПРОДАНО</p>'}
                    
                    <div class="product-meta">
                        <p><strong>Shipping:</strong> Бесплатная доставка от 7000₽</p>
                        <p><strong>Returns:</strong> 30 дней на возврат</p>
                        <p><strong>Availability:</strong> ${product.inStock ? 'В наличии' : 'Нет в наличии'}</p>
                        
                        <div class="share-buttons">
                            <span class="share-btn">Поделиться во ВКонтакте</span>
                            <span class="share-btn">Поделиться в Телеграмм</span>
                            <span class="share-btn">Скопировать ссылку</span>
                        </div>
                    </div>
                </div>
            `;
            
            // Добавляем обработчик для кнопки добавления в корзину
            const addBtn = container.querySelector('.add-to-cart-detail');
            if (addBtn) {
                addBtn.addEventListener('click', function() {
                    const quantity = parseInt(document.querySelector('.quantity-input').value);
                    const selectedSize = document.querySelector('.size-option.selected');
                    
                    if (!selectedSize) {
                        alert('Пожалуйста выберите размер');
                        return;
                    }
                    
                    addToCart(product.id, quantity);
                });
            }
        }
        
        function loadRelatedProducts() {
            const grid = document.getElementById('related-grid');
            if (!grid) return;
            
            // Получаем 4 случайных товара для демонстрации
            const related = [...products].sort(() => 0.5 - Math.random()).slice(0, 4);
            
            grid.innerHTML = '';
            related.forEach(product => {
                const card = document.createElement('a');
                card.href = `product.html?id=${product.id}`;
                card.className = `product-card ${!product.inStock ? 'sold-out' : ''}`;
                
                card.innerHTML = `
                    <div class="product-image">
                        <img src="https://via.placeholder.com/300x400/f6f6f6/000000?text=${product.name.replace(/ /g, '+')}" alt="${product.name}" style="width:100%; height:100%; object-fit:cover;">
                    </div>
                    <div class="product-info">
                        <div class="product-title">${product.name}</div>
                        <div class="product-price">₽${product.price.toFixed(2)}</div>
                    </div>
                `;
                grid.appendChild(card);
            });
        }
        
        function setupProductInteractions() {
            // Выбор размера
            const sizeOptions = document.querySelectorAll('.size-option:not(.disabled)');
            sizeOptions.forEach(option => {
                option.addEventListener('click', function() {
                    document.querySelectorAll('.size-option').forEach(opt => opt.classList.remove('selected'));
                    this.classList.add('selected');
                });
            });
            
            // Количество товара
            const minusBtn = document.querySelector('.quantity-btn.minus');
            const plusBtn = document.querySelector('.quantity-btn.plus');
            const quantityInput = document.querySelector('.quantity-input');
            
            if (minusBtn && plusBtn && quantityInput) {
                minusBtn.addEventListener('click', function() {
                    let val = parseInt(quantityInput.value);
                    if (val > 1) quantityInput.value = val - 1;
                });
                
                plusBtn.addEventListener('click', function() {
                    let val = parseInt(quantityInput.value);
                    if (val < 10) quantityInput.value = val + 1;
                });
            }
            
            // Кнопки поделиться
            document.querySelectorAll('.share-btn').forEach(btn => {
                btn.addEventListener('click', function() {
                    alert('Функциональность совместного использования была бы открыта в реальной реализации');
                });
            });
        }
    </script>
</body>
</html>

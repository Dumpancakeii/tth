<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TrustTheHood / Профиль</title>
    <link rel="stylesheet" href="style.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,400;14..32,500;14..32,600;14..32,700&display=swap" rel="stylesheet">
    <style>
        .profile-container {
            max-width: 600px;
            margin: 0 auto;
        }
        
        .profile-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 40px;
            padding-bottom: 20px;
            border-bottom: 1px solid var(--border);
        }
        
        .profile-avatar {
            width: 80px;
            height: 80px;
            border-radius: 50%;
            background: var(--border);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 32px;
            font-weight: 600;
            text-transform: uppercase;
        }
        
        .profile-stats {
            display: flex;
            gap: 40px;
        }
        
        .stat-item {
            text-align: center;
        }
        
        .stat-value {
            font-size: 24px;
            font-weight: 700;
        }
        
        .stat-label {
            font-size: 13px;
            color: var(--text-light);
            text-transform: uppercase;
        }
        
        .profile-section {
            margin-bottom: 40px;
        }
        
        .section-title {
            font-size: 16px;
            font-weight: 600;
            margin-bottom: 20px;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }
        
        .info-grid {
            background: #f9f9f9;
            border: 1px solid var(--border);
            padding: 25px;
        }
        
        .info-row {
            display: flex;
            padding: 15px 0;
            border-bottom: 1px solid var(--border);
        }
        
        .info-row:last-child {
            border-bottom: none;
        }
        
        .info-label {
            width: 120px;
            font-weight: 500;
            font-size: 14px;
            color: var(--text-light);
        }
        
        .info-value {
            flex: 1;
        }
        
        .edit-btn {
            margin-left: auto;
            font-size: 13px;
            text-decoration: underline;
            cursor: pointer;
        }
        
        .address-card {
            background: #f9f9f9;
            border: 1px solid var(--border);
            padding: 20px;
            margin-bottom: 15px;
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
        }
        
        .address-default {
            font-size: 12px;
            color: var(--text-light);
            margin-bottom: 5px;
            text-transform: uppercase;
        }
        
        .address-actions {
            display: flex;
            gap: 15px;
        }
        
        .address-action {
            font-size: 13px;
            text-decoration: underline;
            cursor: pointer;
        }
        
        .add-address {
            display: inline-block;
            margin-top: 15px;
            font-weight: 500;
            text-decoration: underline;
            cursor: pointer;
        }
        
        .recent-orders {
            margin-top: 30px;
        }
        
        .recent-order-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 15px 0;
            border-bottom: 1px solid var(--border);
        }
        
        .order-number {
            font-weight: 500;
        }
        
        .order-date {
            font-size: 13px;
            color: var(--text-light);
        }
        
        .order-total {
            font-weight: 600;
        }
        
        .view-all {
            text-align: center;
            margin-top: 25px;
        }
        
        .view-all a {
            color: var(--text);
            text-decoration: underline;
            font-size: 14px;
        }
        
        .danger-zone {
            margin-top: 60px;
            padding: 20px;
            border: 1px solid #ef4444;
            background: #fef2f2;
        }
        
        .danger-title {
            color: #ef4444;
            font-weight: 600;
            margin-bottom: 10px;
            text-transform: uppercase;
            font-size: 14px;
        }
        
        .danger-description {
            font-size: 14px;
            margin-bottom: 20px;
            color: #7f1d1d;
        }
        
        .btn-danger {
            background: #ef4444;
            color: white;
            border: 1px solid #ef4444;
            width: auto;
            padding: 12px 25px;
        }
        
        .btn-danger:hover {
            background: white;
            color: #ef4444;
        }
    </style>
</head>
<body>
    <div class="top-banner">Бесплатная доставка от 7000₽</div>

    <header class="site-header">
        <div class="header-container">
            <div class="logo">
                <a href="index.html">TrustTheHood</a>
            </div>
            <nav class="main-nav">
                <ul>
                    <li><a href="index.html">Магазин</a></li>
                    <li><a href="profile.html" class="active">Профиль</a></li>
                    <li><a href="orders.html">Заказы</a></li>
                    <li><a href="cart.html">Корзина(<span id="cart-count">0</span>)</a></li>
                </ul>
            </nav>
        </div>
    </header>

    <main class="main-content">
        <div class="container">
            <div class="profile-container" id="profile-container">
                <!-- Динамически загружается через JS -->
            </div>
        </div>
    </main>

    <footer class="site-footer">
        <div class="container">
            <p>© 2026 TTH STORE</p>
        </div>
    </footer>

    <!-- Модальное окно редактирования -->
    <div class="modal" id="edit-modal" style="display:none; position:fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.5); align-items:center; justify-content:center; z-index:1000;">
        <div style="background:white; max-width:500px; width:90%; padding:40px; border:1px solid var(--border);">
            <h3 style="margin-bottom:20px; font-weight:500;">Редактировать профиль</h3>
            <form id="edit-form">
                <div class="form-group">
                    <label>Полное имя</label>
                    <input type="text" id="edit-name">
                </div>
                <div class="form-group">
                    <label>Email</label>
                    <input type="email" id="edit-email">
                </div>
                <div class="form-group">
                    <label>Номер телефона</label>
                    <input type="tel" id="edit-phone">
                </div>
                <div style="display:flex; gap:15px; margin-top:30px;">
                    <button type="submit" class="btn">Сохранить изменения</button>
                    <button type="button" class="btn" style="background:none; color:var(--text);" onclick="closeEditModal()">Закрыть</button>
                </div>
            </form>
        </div>
    </div>

    <script src="script.js"></script>
    <script>
        document.addEventListener('DOMContentLoaded', function() {
            loadProfilePage();
            
            // Проверка авторизации
            const user = localStorage.getItem('tth_user');
            if (!user) {
                window.location.href = 'login.html?redirect=profile.html';
            }
        });
        
        function loadProfilePage() {
            const container = document.getElementById('profile-container');
            if (!container) return;
            
            const user = JSON.parse(localStorage.getItem('tth_user') || '{"name":"Guest User","email":"guest@tth.com"}');
            
            // Получаем статистику заказов
            const orders = JSON.parse(localStorage.getItem('tth_orders') || '[]');
            const totalOrders = orders.length;
            const totalSpent = orders.reduce((sum, order) => sum + order.total, 0);
            
            // Получаем адреса
            const addresses = JSON.parse(localStorage.getItem('tth_addresses') || '[]');
            if (addresses.length === 0) {
                addresses.push({
                    id: 1,
                    type: 'Адрес',
                    street: 'ул. Уличная, д. 17',
                    city: 'Россия, г. Владимир, 600000',
                    country: 'Россия',
                    isDefault: true
                });
                localStorage.setItem('tth_addresses', JSON.stringify(addresses));
            }
            
            // Получаем последние заказы
            const recentOrders = orders.slice(0, 3);
            
            // Аватар (первая буква имени)
            const avatarLetter = user.name ? user.name.charAt(0).toUpperCase() : 'G';
            
            container.innerHTML = `
                <div class="profile-header">
                    <div class="profile-avatar">${avatarLetter}</div>
                    <div class="profile-stats">
                        <div class="stat-item">
                            <div class="stat-value">${totalOrders}</div>
                            <div class="stat-label">Заказы</div>
                        </div>
                        <div class="stat-item">
                            <div class="stat-value">₽${totalSpent.toFixed(0)}</div>
                            <div class="stat-label">Потрачено</div>
                        </div>
                    </div>
                </div>
                
                <div class="profile-section">
                    <div class="section-title">Персональная информация</div>
                    <div class="info-grid">
                        <div class="info-row">
                            <span class="info-label">Полное имя</span>
                            <span class="info-value" id="display-name">${user.name || 'Не задано'}</span>
                            <span class="edit-btn" onclick="openEditModal('name')">Редактировать</span>
                        </div>
                        <div class="info-row">
                            <span class="info-label">Email</span>
                            <span class="info-value" id="display-email">${user.email || 'Не задан'}</span>
                            <span class="edit-btn" onclick="openEditModal('email')">Редактировать</span>
                        </div>
                        <div class="info-row">
                            <span class="info-label">Номер телефона</span>
                            <span class="info-value" id="display-phone">${user.phone || 'Не задан'}</span>
                            <span class="edit-btn" onclick="openEditModal('phone')">Редактировать</span>
                        </div>
                        <div class="info-row">
                            <span class="info-label">Дата регистрации</span>
                            <span class="info-value">Март 2026</span>
                        </div>
                    </div>
                </div>
                
                <div class="profile-section">
                    <div class="section-title">Адреса доставки</div>
                    ${addresses.map(addr => `
                        <div class="address-card">
                            <div>
                                ${addr.isDefault ? '<div class="address-default">Default</div>' : ''}
                                <div style="font-weight:500; margin-bottom:5px;">${addr.type}</div>
                                <div>${addr.street}</div>
                                <div>${addr.city}</div>
                                <div>${addr.country}</div>
                            </div>
                            <div class="address-actions">
                                <span class="address-action">Редактировать</span>
                                ${!addr.isDefault ? '<span class="address-action">Установить по умолчанию</span>' : ''}
                                ${!addr.isDefault ? '<span class="address-action">Удалить</span>' : ''}
                            </div>
                        </div>
                    `).join('')}
                    
                    <div class="add-address" onclick="addNewAddress()">+ Добавить новый адрес</div>
                </div>
                
                <div class="profile-section">
                    <div class="section-title">Последние заказы</div>
                    <div class="recent-orders">
                        ${recentOrders.length > 0 ? recentOrders.map(order => `
                            <div class="recent-order-item">
                                <div>
                                    <div class="order-number">${order.id}</div>
                                    <div class="order-date">${order.date}</div>
                                </div>
                                <div class="order-total">₽${order.total.toFixed(2)}</div>
                            </div>
                        `).join('') : 
                        '<p style="color: var(--text-light); text-align:center; padding:20px;">Заказов нет</p>'}
                    </div>
                    
                    <div class="view-all">
                        <a href="orders.html">Посмотреть все заказы →</a>
                    </div>
                </div>
                
                <div class="danger-zone">
                    <div class="danger-title">ВНИМАНИЕ!</div>
                    <div class="danger-description">Как только вы удалите свою учетную запись, пути назад не будет. Пожалуйста, будьте уверены в своём выборе.</div>
                    <button class="btn-danger" onclick="deleteAccount()">Удалить аккаунт</button>
                </div>
            `;
        }
        
        let currentEditField = '';
        
        function openEditModal(field) {
            const modal = document.getElementById('edit-modal');
            const user = JSON.parse(localStorage.getItem('tth_user') || '{}');
            
            currentEditField = field;
            
            document.getElementById('edit-name').value = user.name || '';
            document.getElementById('edit-email').value = user.email || '';
            document.getElementById('edit-phone').value = user.phone || '';
            
            modal.style.display = 'flex';
        }
        
        function closeEditModal() {
            document.getElementById('edit-modal').style.display = 'none';
        }
        
        function addNewAddress() {
            const newAddress = {
                id: Date.now(),
                type: 'Новый адрес',
                street: 'Добавьте дом и улицу',
                city: 'Добавьте город',
                country: 'Россия',
                isDefault: false
            };
            
            const addresses = JSON.parse(localStorage.getItem('tth_addresses') || '[]');
            addresses.push(newAddress);
            localStorage.setItem('tth_addresses', JSON.stringify(addresses));
            
            loadProfilePage();
        }
        
        function deleteAccount() {
            if (confirm('Вы уверены в том что хотите удалить аккаунт? Это действие необратимо.')) {
                localStorage.removeItem('tth_user');
                localStorage.removeItem('tth_orders');
                localStorage.removeItem('tth_addresses');
                localStorage.removeItem('tth_cart');
                
                alert('Аккаунт удалён');
                window.location.href = 'index.html';
            }
        }
        
        // Обработка формы редактирования
        document.addEventListener('submit', function(e) {
            if (e.target.id === 'edit-form') {
                e.preventDefault();
                
                const user = JSON.parse(localStorage.getItem('tth_user') || '{}');
                user.name = document.getElementById('edit-name').value;
                user.email = document.getElementById('edit-email').value;
                user.phone = document.getElementById('edit-phone').value;
                
                localStorage.setItem('tth_user', JSON.stringify(user));
                
                closeEditModal();
                loadProfilePage();
            }
        });
    </script>
</body>
</html>
